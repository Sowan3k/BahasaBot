<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Journey / Learning Roadmap illustration -->

  <!-- Road path (winding from bottom to top) -->
  <path d="M100 185 Q60 165 70 140 Q80 115 100 110 Q120 105 130 85 Q140 65 120 45 Q110 35 100 28"
        stroke="#a18f5c" stroke-width="14" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M100 185 Q60 165 70 140 Q80 115 100 110 Q120 105 130 85 Q140 65 120 45 Q110 35 100 28"
        stroke="#c4af7c" stroke-width="8" fill="none" stroke-linecap="round" opacity="0.25"/>
  <!-- Road dashes (centre line) -->
  <path d="M100 185 Q60 165 70 140 Q80 115 100 110 Q120 105 130 85 Q140 65 120 45 Q110 35 100 28"
        stroke="#f5e6d3" stroke-width="1.5" fill="none" stroke-linecap="round"
        stroke-dasharray="8,10" opacity="0.2"/>

  <!-- Milestone nodes on the road -->
  <!-- Node 1 — BPS-1 (bottom, completed) -->
  <circle cx="100" cy="175" r="14" fill="#8a9f7b" opacity="0.5"/>
  <circle cx="100" cy="175" r="11" fill="#8a9f7b" opacity="0.7"/>
  <text x="100" y="179" text-anchor="middle" font-family="system-ui,sans-serif"
        font-size="9" font-weight="700" fill="#f5e6d3" opacity="0.9">BPS-1</text>
  <!-- Checkmark -->
  <path d="M94 175 L98 179 L107 170" stroke="#f5e6d3" stroke-width="2"
        fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Node 2 — BPS-2 (completed) -->
  <circle cx="72" cy="138" r="13" fill="#8a9f7b" opacity="0.45"/>
  <circle cx="72" cy="138" r="10" fill="#8a9f7b" opacity="0.65"/>
  <text x="72" y="142" text-anchor="middle" font-family="system-ui,sans-serif"
        font-size="9" font-weight="700" fill="#f5e6d3" opacity="0.9">BPS-2</text>
  <path d="M66 138 L70 142 L79 133" stroke="#f5e6d3" stroke-width="2"
        fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Node 3 — BPS-3 (current, glowing) -->
  <circle cx="115" cy="95" r="18" fill="#a18f5c" opacity="0.2"/>
  <circle cx="115" cy="95" r="14" fill="#a18f5c" opacity="0.35"/>
  <circle cx="115" cy="95" r="11" fill="#a18f5c" opacity="0.8"/>
  <!-- Pulse ring -->
  <circle cx="115" cy="95" r="20" fill="none" stroke="#a18f5c" stroke-width="2" opacity="0.35"/>
  <text x="115" y="99" text-anchor="middle" font-family="system-ui,sans-serif"
        font-size="9" font-weight="700" fill="#f5e6d3" opacity="0.95">BPS-3</text>

  <!-- Node 4 — BPS-4 (locked, top) -->
  <circle cx="105" cy="32" r="13" fill="#1a3d4f" opacity="0.6"/>
  <circle cx="105" cy="32" r="10" fill="#1a3d4f" opacity="0.8"/>
  <text x="105" y="36" text-anchor="middle" font-family="system-ui,sans-serif"
        font-size="9" font-weight="700" fill="#f5e6d3" opacity="0.4">BPS-4</text>
  <!-- Lock icon -->
  <rect x="101" y="29" width="8" height="6" rx="1.5" fill="#f5e6d3" opacity="0.25"/>
  <path d="M102 29 Q102 25 105 25 Q108 25 108 29" stroke="#f5e6d3" stroke-width="1.5"
        fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Surrounding foliage / scenery -->
  <!-- Left trees -->
  <ellipse cx="30" cy="155" rx="16" ry="22" fill="#8a9f7b" opacity="0.2"/>
  <ellipse cx="20" cy="168" rx="12" ry="18" fill="#8a9f7b" opacity="0.15"/>
  <rect x="27" y="170" width="5" height="20" rx="2" fill="#a18f5c" opacity="0.2"/>
  <!-- Right trees -->
  <ellipse cx="170" cy="130" rx="15" ry="20" fill="#8a9f7b" opacity="0.18"/>
  <ellipse cx="182" cy="145" rx="12" ry="16" fill="#8a9f7b" opacity="0.14"/>

  <!-- Stars / sky dots -->
  <circle cx="22" cy="30" r="1.5" fill="#f5e6d3" opacity="0.5"/>
  <circle cx="45" cy="18" r="1" fill="#f5e6d3" opacity="0.4"/>
  <circle cx="170" cy="22" r="1.5" fill="#f5e6d3" opacity="0.5"/>
  <circle cx="188" cy="40" r="1" fill="#f5e6d3" opacity="0.4"/>

  <!-- "Goal" flag at top -->
  <line x1="100" y1="15" x2="100" y2="28" stroke="#c4af7c" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <polygon points="100,15 118,20 100,25" fill="#c4af7c" opacity="0.7"/>

  <!-- XP label near current node -->
  <rect x="130" y="82" width="28" height="14" rx="6" fill="#a18f5c" opacity="0.4"/>
  <text x="144" y="92" text-anchor="middle" font-family="system-ui,sans-serif"
        font-size="9" font-weight="600" fill="#f5e6d3" opacity="0.8">+XP</text>
</svg>
