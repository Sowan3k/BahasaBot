<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Desk surface -->
  <ellipse cx="100" cy="158" rx="75" ry="16" fill="#a18f5c" opacity="0.2"/>
  <rect x="25" y="150" width="150" height="12" rx="4" fill="#a18f5c" opacity="0.25"/>

  <!-- Laptop body -->
  <rect x="50" y="90" width="100" height="62" rx="6" fill="#2d7d7d" opacity="0.85"/>
  <rect x="54" y="94" width="92" height="54" rx="4" fill="#1a3d4f" opacity="0.9"/>
  <!-- Laptop hinge / bottom base -->
  <rect x="45" y="150" width="110" height="8" rx="4" fill="#2d7d7d" opacity="0.7"/>
  <rect x="70" y="155" width="60" height="3" rx="1.5" fill="#1a5060" opacity="0.5"/>

  <!-- Screen content: AI chat interface -->
  <!-- Header bar -->
  <rect x="54" y="94" width="92" height="12" rx="4" fill="#8a9f7b" opacity="0.35"/>
  <circle cx="62" cy="100" r="3" fill="#8a9f7b" opacity="0.7"/>
  <!-- "BahasaBot" label in header -->
  <rect x="70" y="97" width="30" height="5" rx="2.5" fill="#f5e6d3" opacity="0.4"/>

  <!-- User chat bubble (right) -->
  <rect x="110" y="112" width="32" height="10" rx="4" fill="#8a9f7b" opacity="0.5"/>
  <polygon points="142,118 148,116 142,122" fill="#8a9f7b" opacity="0.5"/>
  <rect x="113" y="115" width="25" height="4" rx="2" fill="#f5e6d3" opacity="0.35"/>

  <!-- AI response bubble (left) -->
  <rect x="58" y="126" width="72" height="14" rx="4" fill="#a18f5c" opacity="0.5"/>
  <polygon points="58,132 52,130 58,136" fill="#a18f5c" opacity="0.5"/>
  <!-- "Selamat datang!" in bubble -->
  <rect x="62" y="129" width="20" height="4" rx="2" fill="#f5e6d3" opacity="0.5"/>
  <rect x="84" y="129" width="14" height="4" rx="2" fill="#c4af7c" opacity="0.5"/>
  <rect x="100" y="129" width="18" height="4" rx="2" fill="#f5e6d3" opacity="0.35"/>
  <!-- Selamat datang small text label -->
  <rect x="62" y="134" width="34" height="3" rx="1.5" fill="#f5e6d3" opacity="0.2"/>

  <!-- Typing indicator dots -->
  <circle cx="68" cy="144" r="2.5" fill="#8a9f7b" opacity="0.6"/>
  <circle cx="75" cy="144" r="2.5" fill="#8a9f7b" opacity="0.4"/>
  <circle cx="82" cy="144" r="2.5" fill="#8a9f7b" opacity="0.25"/>

  <!-- Student figure (seated, right of laptop) -->
  <!-- Head -->
  <circle cx="162" cy="102" r="13" fill="#c47a5c" opacity="0.85"/>
  <!-- Hair suggestion -->
  <path d="M150 98 Q162 88 174 98" fill="#5c3a1e" opacity="0.6"/>
  <!-- Eyes -->
  <circle cx="157" cy="101" r="1.8" fill="#1a1a1a" opacity="0.7"/>
  <circle cx="167" cy="101" r="1.8" fill="#1a1a1a" opacity="0.7"/>
  <!-- Smile -->
  <path d="M157 107 Q162 111 167 107" stroke="#1a1a1a" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Body / torso -->
  <ellipse cx="162" cy="138" rx="16" ry="20" fill="#c47a5c" opacity="0.6"/>
  <!-- Arms toward laptop -->
  <path d="M148 132 Q120 140 110 148" stroke="#c47a5c" stroke-width="8" stroke-linecap="round" fill="none" opacity="0.55"/>
  <path d="M148 132 Q130 138 118 144" stroke="#c47a5c" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.35"/>

  <!-- Textbook / notebook beside laptop -->
  <rect x="20" y="128" width="28" height="38" rx="3" fill="#a18f5c" opacity="0.6"/>
  <rect x="22" y="130" width="24" height="36" rx="2" fill="#c4af7c" opacity="0.3"/>
  <!-- Book spine -->
  <rect x="20" y="128" width="4" height="38" rx="2" fill="#8a6f3c" opacity="0.6"/>
  <!-- Text lines on book -->
  <rect x="25" y="136" width="16" height="2" rx="1" fill="#f5e6d3" opacity="0.4"/>
  <rect x="25" y="141" width="14" height="2" rx="1" fill="#f5e6d3" opacity="0.3"/>
  <rect x="25" y="146" width="18" height="2" rx="1" fill="#f5e6d3" opacity="0.4"/>
  <rect x="25" y="151" width="12" height="2" rx="1" fill="#f5e6d3" opacity="0.3"/>
  <!-- "BM" cover label -->
  <rect x="24" y="132" width="20" height="8" rx="2" fill="#2d7d7d" opacity="0.5"/>
  <rect x="27" y="134" width="14" height="3" rx="1" fill="#f5e6d3" opacity="0.5"/>

  <!-- Coffee mug -->
  <rect x="170" y="136" width="18" height="20" rx="4" fill="#c4af7c" opacity="0.5"/>
  <ellipse cx="179" cy="136" rx="9" ry="3.5" fill="#c4af7c" opacity="0.4"/>
  <!-- Coffee surface -->
  <ellipse cx="179" cy="136" rx="7" ry="2.5" fill="#5c3a1e" opacity="0.4"/>
  <!-- Handle -->
  <path d="M188 142 Q196 142 196 149 Q196 156 188 156" stroke="#c4af7c" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Steam -->
  <path d="M175 130 Q173 123 176 118" stroke="#f5e6d3" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.3"/>
  <path d="M181 129 Q179 122 182 117" stroke="#f5e6d3" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.25"/>

  <!-- Malay flag flag pin on desk -->
  <line x1="35" y1="120" x2="35" y2="150" stroke="#c4af7c" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <rect x="35" y="120" width="16" height="10" rx="1" fill="#c47a5c" opacity="0.6"/>
  <line x1="35" y1="122" x2="51" y2="122" stroke="#f5e6d3" stroke-width="1" opacity="0.4"/>
  <line x1="35" y1="125" x2="51" y2="125" stroke="#f5e6d3" stroke-width="1" opacity="0.4"/>
  <line x1="35" y1="128" x2="51" y2="128" stroke="#f5e6d3" stroke-width="1" opacity="0.4"/>
</svg>
