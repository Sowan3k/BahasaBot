<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">

  <!-- Classroom wall -->
  <rect width="200" height="200" fill="#111b1c" opacity="0.6"/>

  <!-- Whiteboard / blackboard — large and central -->
  <rect x="14" y="14" width="172" height="108" rx="6" fill="#1e4f52" opacity="0.9"/>
  <rect x="18" y="18" width="164" height="100" rx="4" fill="#1a4548" opacity="0.95"/>
  <!-- Board glare line -->
  <rect x="18" y="18" width="164" height="3" rx="2" fill="white" opacity="0.06"/>
  <!-- Board frame -->
  <rect x="14" y="14" width="172" height="108" rx="6" fill="none" stroke="#2d7d7d" stroke-width="1.5" opacity="0.6"/>

  <!-- Board text: main phrase -->
  <text x="100" y="52" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="22" font-weight="700"
        fill="#f5e6d3" opacity="0.92">Selamat Pagi!</text>

  <!-- Underline the phrase -->
  <line x1="30" y1="58" x2="170" y2="58" stroke="#c4af7c" stroke-width="1" opacity="0.3"/>

  <!-- Translation line -->
  <text x="100" y="74" text-anchor="middle"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="12" font-weight="400"
        fill="#c4af7c" opacity="0.75">Good Morning!</text>

  <!-- Vocabulary list on the board -->
  <text x="28" y="93" font-family="system-ui, sans-serif" font-size="10" fill="#8a9f7b" opacity="0.7">• Pagi = Morning</text>
  <text x="28" y="107" font-family="system-ui, sans-serif" font-size="10" fill="#8a9f7b" opacity="0.6">• Apa khabar? = How are you?</text>

  <!-- Chalk tray -->
  <rect x="14" y="119" width="172" height="7" rx="2" fill="#1a3d40" opacity="0.8"/>
  <rect x="22" y="120" width="18" height="4" rx="2" fill="#f5e6d3" opacity="0.55"/>
  <rect x="44" y="120" width="12" height="4" rx="2" fill="#f5e6d3" opacity="0.4"/>
  <rect x="60" y="120" width="9" height="4" rx="2" fill="#c4af7c" opacity="0.5"/>
  <!-- Eraser/duster -->
  <rect x="158" y="119" width="22" height="7" rx="2" fill="#a18f5c" opacity="0.5"/>

  <!-- Teacher figure — left -->
  <circle cx="24" cy="144" r="10" fill="#a18f5c" opacity="0.85"/>
  <!-- Teacher body -->
  <ellipse cx="24" cy="166" rx="11" ry="14" fill="#a18f5c" opacity="0.65"/>
  <!-- Arm pointing at board -->
  <line x1="33" y1="158" x2="58" y2="128" stroke="#a18f5c" stroke-width="5" stroke-linecap="round" opacity="0.65"/>
  <!-- Pointer -->
  <line x1="58" y1="128" x2="70" y2="120" stroke="#c4af7c" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Student desks row -->
  <!-- Desk 1 -->
  <rect x="60" y="158" width="34" height="5" rx="2.5" fill="#c4af7c" opacity="0.4"/>
  <rect x="63" y="163" width="28" height="22" rx="3" fill="#a18f5c" opacity="0.2"/>
  <circle cx="77" cy="146" r="9" fill="#8a9f7b" opacity="0.85"/>

  <!-- Desk 2 -->
  <rect x="104" y="158" width="34" height="5" rx="2.5" fill="#c4af7c" opacity="0.4"/>
  <rect x="107" y="163" width="28" height="22" rx="3" fill="#a18f5c" opacity="0.2"/>
  <circle cx="121" cy="146" r="9" fill="#c47a5c" opacity="0.85"/>

  <!-- Desk 3 (partial, right edge) -->
  <rect x="150" y="158" width="34" height="5" rx="2.5" fill="#c4af7c" opacity="0.35"/>
  <rect x="153" y="163" width="28" height="22" rx="3" fill="#a18f5c" opacity="0.2"/>
  <circle cx="167" cy="146" r="9" fill="#2d7d7d" opacity="0.85"/>

  <!-- Notebooks on desks -->
  <rect x="65" y="159" width="16" height="12" rx="2" fill="#f5e6d3" opacity="0.25"/>
  <rect x="109" y="159" width="16" height="12" rx="2" fill="#f5e6d3" opacity="0.25"/>

  <!-- Floor line -->
  <line x1="0" y1="185" x2="200" y2="185" stroke="#2d7d7d" stroke-width="0.8" opacity="0.2"/>
</svg>
