[build]
builder = "DOCKERFILE"
# Dockerfile path is relative to the root directory configured in Railway dashboard.
# Set Root Directory = backend/ in the Railway project settings.
# With root = backend/, this Dockerfile is at the root of the build context.
dockerfilePath = "Dockerfile"

[deploy]
# CMD in Dockerfile handles startup: alembic upgrade head && uvicorn backend.main:app
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
