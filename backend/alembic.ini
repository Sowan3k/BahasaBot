# Alembic configuration - lives inside backend/
# Used by the Docker container (build context = backend/).
#
# script_location is relative to THIS file's directory (/app/backend/ in Docker,
# backend/ locally), so 'db/migrations' resolves to backend/db/migrations/ (ok)
#
# To run migrations locally from the REPO ROOT, use the root alembic.ini instead:
#   alembic upgrade head
#
# To run migrations from INSIDE the backend/ directory (or in Docker):
#   alembic -c alembic.ini upgrade head
#   alembic -c backend/alembic.ini upgrade head   (from /app/ in Docker)

[alembic]
script_location = db/migrations

# Template for new migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for file timestamps
timezone = UTC

# Max length for slug in filename
truncate_slug_length = 40

# Do NOT use prepend_sys_path here — PYTHONPATH=/app handles import resolution in Docker
# prepend_sys_path would add /app/backend/ to sys.path, but we need /app/ for backend.* imports

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
